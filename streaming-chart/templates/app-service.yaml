apiVersion: v1
kind: Service
metadata:
  name: streaming-frontend
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: streaming-frontend
---
apiVersion: v1
kind: Service
metadata:
  name: streaming-hello-service
spec:
  type: ClusterIP
  ports:
    - port: 5001
      targetPort: 5001
  selector:
    app: streaming-hello-service
---
apiVersion: v1
kind: Service
metadata:
  name: streaming-profile-service
spec:
  type: ClusterIP
  ports:
    - port: 5002
      targetPort: 5002
  selector:
    app: streaming-profile-service
